name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:launch-gates

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_ENABLED: ${{ secrets.PLAYWRIGHT_E2E_ENABLED }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      CLERK_DEMO_USER_ID: ${{ secrets.CLERK_DEMO_USER_ID }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PIPELINE_DEMO_MODE: "1"
      ALLOW_PIPELINE_DEMO_MODE: "1"
    steps:
      - name: Skip without configured E2E secrets
        if: env.E2E_ENABLED != '1'
        run: echo "Playwright skipped; set PLAYWRIGHT_E2E_ENABLED=1 after configuring CI secrets."
      - uses: actions/checkout@v4
        if: env.E2E_ENABLED == '1'
      - uses: actions/setup-node@v4
        if: env.E2E_ENABLED == '1'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: env.E2E_ENABLED == '1'
      - run: npx playwright install --with-deps chromium
        if: env.E2E_ENABLED == '1'
      - name: Bootstrap local Convex
        if: env.E2E_ENABLED == '1'
        run: bash scripts/agent-env-setup.sh bootstrap
      - name: Start Convex
        if: env.E2E_ENABLED == '1'
        run: CONVEX_AGENT_MODE=anonymous npx convex dev --tail-logs disable > /tmp/convex.log 2>&1 &
      - name: Start application
        if: env.E2E_ENABLED == '1'
        run: npm run dev > /tmp/next.log 2>&1 &
      - name: Run Playwright
        if: env.E2E_ENABLED == '1'
        run: npx wait-on http://localhost:3000 && npm run test:e2e
      - name: Upload Playwright artifacts
        if: always() && env.E2E_ENABLED == '1'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: artifacts/launch-audit
          if-no-files-found: ignore
